<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>me77 App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f1115;
      color:white;
      font-family:Arial, sans-serif;
    }

    .container{
      max-width:500px;
      margin:auto;
      padding:40px 25px 80px;
      text-align:center;
    }

    .logo{
      font-size:60px;
      font-weight:bold;
      color:#ffb300;
      margin-top:40px;
    }

    .title{
      font-size:38px;
      font-weight:bold;
      margin-top:25px;
      line-height:1.3;
    }

    .subtitle{
      color:#bdbdbd;
      margin-top:18px;
      font-size:17px;
      line-height:1.7;
    }

    .phone-box{
      margin-top:50px;
      background:#171b22;
      border-radius:30px;
      padding:40px 20px;
      border:1px solid #2a2f3a;
    }

    .phone-screen{
      background:#0f1115;
      border-radius:25px;
      padding:50px 20px;
    }

.app-icon{
  width:90px;
  height:90px;
  border-radius:24px;
  margin:auto;
  object-fit:cover;
  display:block;
}

    .app-name{
      margin-top:20px;
      font-size:26px;
      font-weight:bold;
    }

    .version{
      margin-top:10px;
      color:#888;
      font-size:15px;
    }

    .open-btn{
      display:block;
      margin-top:35px;
      background:#ff9800;
      color:white;
      text-decoration:none;
      padding:18px;
      border-radius:16px;
      font-size:20px;
      font-weight:bold;
    }

    .telegram-btn{
      display:block;
      margin-top:18px;
      background:#229ED9;
      color:white;
      text-decoration:none;
      padding:18px;
      border-radius:16px;
      font-size:18px;
      font-weight:bold;
    }

    .guide{
      margin-top:50px;
      text-align:left;
    }

    .guide-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .step{
      background:#171b22;
      border-radius:18px;
      padding:18px;
      margin-bottom:15px;
      color:#d0d0d0;
      line-height:1.7;
    }

  </style>

</head>

<body>

<div class="container">

  <div class="logo">
    me77
  </div>

  <div class="title">
    Open me77 Web App
  </div>

  <div class="subtitle">
    Fast, Secure & Mobile Friendly Experience
  </div>

  <div class="phone-box">

    <div class="phone-screen">

      <img class="app-icon" src="me77 - Fav Icon.png">

      <div class="app-name">
        me77 App
      </div>

      <div class="version">
        Latest Version
      </div>

      <a class="open-btn" href="https://oqo9.qw.me77.net/">
        Open App
      </a>

      <a class="telegram-btn" href="https://t.me/me77Malaysia_Sharing">
        Join Telegram
      </a>

    </div>

  </div>

  <div class="guide">

    <div class="guide-title">
      How To Install
    </div>

    <div class="step">
      1. Tap "Open App"
    </div>

    <div class="step">
      2. Login to your account
    </div>

    <div class="step">
      3. Tap "Add to Home Screen"
    </div>

    <div class="step">
      4. Open me77 directly from your phone home screen
    </div>

  </div>

</div>

</body>

</html>
